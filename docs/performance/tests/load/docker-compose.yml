services:
  mongodb:
    image: mongo:latest
    container_name: marreta-mongodb
    environment:
      MONGO_INITDB_DATABASE: ecommerce
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: marreta-postgres
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: marreta
      POSTGRES_PASSWORD: marreta
    volumes:
      - ../../examples/ecommerce/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marreta -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  marreta:
    build:
      context: ../..
      dockerfile: tests/load/Dockerfile
    container_name: marreta-ecommerce
    ports:
      - "8080:8080"
    environment:
      - MARRETA_DB_PROVIDER=postgres
      - MARRETA_DB_HOST=postgres
      - MARRETA_DB_PORT=5432
      - MARRETA_DB_NAME=ecommerce
      - MARRETA_DB_USER=marreta
      - MARRETA_DB_PASSWORD=marreta
      - MARRETA_DB_POOL_MAX_CONNECTIONS=50
      - MARRETA_DOC_PROVIDER=mongodb
      - MARRETA_DOC_HOST=mongodb
      - MARRETA_DOC_PORT=27017
      - MARRETA_DOC_NAME=ecommerce
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  k6:
    image: grafana/k6:latest
    container_name: marreta-k6
    depends_on:
      marreta:
        condition: service_healthy
    volumes:
      - ./k6:/scripts
      - ./results:/results
    environment:
      - BASE_URL=http://marreta:8080
    profiles:
      - test
