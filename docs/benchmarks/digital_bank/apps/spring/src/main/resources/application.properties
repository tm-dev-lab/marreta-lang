server.port=8080
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/bank}
spring.data.mongodb.database=${MONGO_DB:bank}

# Match the other contenders: quiet logs, no banner, dates as ISO-8601 strings.
spring.main.banner-mode=off
logging.level.root=error
spring.jackson.serialization.write-dates-as-timestamps=false
