services:
  mongodb:
    image: mongo:7@sha256:4b5bf3c2bb7516164f6dcb44acce4fdcb428abfe5771a1128304a0f34ab9ff7c
    container_name: bench-bank-mongodb
    environment:
      MONGO_INITDB_DATABASE: bank
      MONGO_INITDB_ROOT_USERNAME: marreta
      MONGO_INITDB_ROOT_PASSWORD: marreta-secret
    healthcheck:
      # Authenticated ping: stays unhealthy until the root user is created, so `--wait` blocks
      # until MongoDB is auth-ready, not merely pingable. Without this, the first app to start can
      # race the auth init and fail to connect (Spec 065's authenticated-healthcheck fix).
      test: ["CMD", "mongosh", "-u", "marreta", "-p", "marreta-secret", "--authenticationDatabase", "admin", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  marreta:
    image: ${MARRETA_IMAGE:-marreta-lang:dev}
    container_name: bench-bank-marreta
    working_dir: /app
    command: ["serve"]
    volumes:
      - ./apps/marreta:/app:ro
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "18080:8080"
    cpus: 1.0
    mem_limit: 1g

  fastapi:
    build:
      context: ./apps/fastapi
    container_name: bench-bank-fastapi
    environment:
      MONGO_URI: mongodb://marreta:marreta-secret@mongodb:27017/bank?authSource=admin
      MONGO_DB: bank
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "18081:8080"
    cpus: 1.0
    mem_limit: 1g

  nest:
    build:
      context: ./apps/nest
    container_name: bench-bank-nest
    environment:
      MONGO_URI: mongodb://marreta:marreta-secret@mongodb:27017/bank?authSource=admin
      MONGO_DB: bank
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "18082:8080"
    cpus: 1.0
    mem_limit: 1g

  spring:
    build:
      context: ./apps/spring
    container_name: bench-bank-spring
    environment:
      MONGO_URI: mongodb://marreta:marreta-secret@mongodb:27017/bank?authSource=admin
      MONGO_DB: bank
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "18083:8080"
    cpus: 1.0
    mem_limit: 1g
